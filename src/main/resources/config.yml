  #
  # Items are given, when player enters the lobby,
  # joins the world as its owner, teleports to
  # coding world and gets all coding blocks and
  # items. You can change slots and items to give.
  #
  # You can add custom items by specifying them here,
  # or with /oc items set lobby [slot] while holding
  # your item in the main hand.
  #
  # If list will be empty, it will give default prepared items.
  # If you don't want to give any item, then set it like:
  # lobby: "none" or lobby: "nothing" (not recommended and
  # not player-friendly, you have to tell players about commands!)
