web:
  #
  # Web services can provide additional features,
  # like API for getting worlds and players info,
  # or downloading a world archive.
  #
  port: 22912
  display-link: "" # URL, that will be displayed in messages to player.
                   # Example: "yourserver.com"
                   # If empty, will be numeric IP of server and ":port" in the ending.
  downloader:
    #
    # Downloader allows player to download archive
    # of world, that contains build and coding world,
    # with command /world download.
    #
    # When player types that command, it will copy world's
    # folders and compress them into one archive, that will be
    # stored in /plugins/OpenCreative/temp/ folder.
    # Then, it sends a link to player, and if player opens the site,
    # player will download archive, and then it will be removed.
    # Otherwise, after period of storing time it will be removed.
    #
    enabled: false
    max-size: 30 # Maximum size of world in MB.
    storing-time: 60 # How many seconds archive will be stored before deleting.
experiments:
  #
  # Experiments are unstable experimental features,
  # that are in development, or are made just for fun.
  # Useful for developers and testers of OpenCreative+.
  #
  # Warning: Some experiments can corrupt the worlds!
  # Be careful! Not recommended to enable!
  #
  wanders: false
  world_downloader: false
  code_downloader: false

watchdog:
  #
  # Watchdog is a system monitor, that checks TPS,
  # RAM and Disk usage and limits loading worlds,
  # when stability is low.
  #
  # Stability has 3 states:
  #  Fine - everything works.
  #  Not Okay - players can join loaded worlds, but can't load worlds or compile code.
  #  Very bad - unloads all worlds, players cannot join worlds.
  #
  # To check status, use: /oc stability
  #
  enabled: false

#
# Maintenance mode unloads all worlds and
# prevents players without admin permissions
# from loading or creating worlds.
#
# /oc maintenance start 30
# /oc maintenance end
#
maintenance: false
#
# In Debug mode OpenCreative+ will send some
# information about plugin's work and state.
# Not useful, if you're not developing OC+.
#
debug: false
#
# The most recent world's ID. It's used
# to create a new world by adding 1
# to current value.
#
last-world-id: 0 # Not

