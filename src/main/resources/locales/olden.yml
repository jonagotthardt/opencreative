  categories:
    sandbox: "&e&lSANDBOX"
    adventure: "&a&lADVENTURE"
    strategy: "&c&lSTRATEGY"
    arcade: "&d&lARCADE"
    roleplay: "&e&lROLEPLAY"
    story: "&3&lSTORY"
    experiment: "&c&lEXPERIMENT"
    simulator: "&6&lSIMULATOR"
