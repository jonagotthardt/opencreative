      transferred-new: "%prefix%You &6became a new owner &fof this world, now old owner can't control this world, but you can edit his permissions in world's players management."
      wrong-id: "%prefix%You typed &6wrong world's ID&f, transferring process is interrupted."
      offline: "%prefix%Player &6is not in world&f, transferring process is interrupted."
      limit: "%prefix%Player &6has many worlds&f, ask him to delete useless worlds, transferring process is interrupted."
      awaiting: "%prefix%You &6sent a request to transfer ownership&f to player, awaiting for his response..."
