      transferred-new: "%prefix%You have &6received ownership&f of this world. The previous owner no longer has any rights to manage it, but you can grant them permissions in the player management settings."
      wrong-id: "%prefix%You entered the &6wrong world ID&f, the transfer process was canceled."
      offline: "%prefix%The player is currently &6not in the world&f, the transfer process was canceled."
      limit: "%prefix%The player already &6has too many worlds&f. Ask them to delete unnecessary worlds, and the transfer process was canceled."
      awaiting: "%prefix%You have &6sent a transfer request&f to the player, awaiting their response..."
