    mobs: "%prefix%&fDeleted &6%count% mobs&f in the world."
  info: "%prefix%&fWorld information: &6%name%\n &f Description: &6%description%&r\n &f Owner: &6%owner%\n &f ID: &6%id%\n &f Created: &6%creation-time%\n &f Last active: &6%activity-time%\n &f Builders: &6%builders%\n &f Developers: &6%coders%\n &f World access: &6%sharing%\n &f World mode: &6%mode%\n &f Online: &6%online%"
