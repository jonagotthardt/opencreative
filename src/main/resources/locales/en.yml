    transfer-ownership:
      confirm-new: "%prefix%The world owner &6wants to transfer ownership of the world&f to you, which means you will have full control over it. If you want to accept, type in the chat: &6%id%"
      confirm-old: "%prefix%Are you sure you want to &6transfer ownership of this world&f to %player%? This means &6this player will have full control over the world&f, but &6you will lose the ability to manage it&f. To confirm, type in the chat: &6%id%"
