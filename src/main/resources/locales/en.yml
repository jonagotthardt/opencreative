  developer:
    turned-on: "&a ● "
    turned-off: "&7 ○ "
    coding-book:
      name: "&bWelcome to Coding! &a[Right-click]"
      lore:
        - "&7This book will teach you"
        - "&7the basic concepts of coding."
      pages:
        - "&9☻ You are in the coding world!&r\n \nHere you will create code for your world using &3b&7l&6o&9c&cks in the inventory.\n \nThis book will help you learn the basics of coding, &cturn the page to continue..."
        - "&3⚂ Get to know the blocks!&r\n \nPlace &3event&0 blocks on &9blue glass&0 to trigger &7actions&0 and &6conditions&0, which you place on &8gray&0 glass."
        - "&3⚂ Get to know the blocks!&r\n \n&lWhat are events?!\n \n&3Player events&r happen when a player performs an action in the world, and then in the code, we execute actions and conditions on the player."
        - "&3⚂ Get to know the blocks!&r\n \n&lWhat are actions?\n \n&7Actions&r allow you to control the player: give items, teleport, or kick them from the world. And that's not all!"
        - "&3⚂ Get to know the blocks!&r\n \n&lHow do conditions work?\n \n&rIf a &6condition&r is met, the code inside the pistons will also execute! Check the player's name, item, block, or status."
        - "&2✉ Values for actions!&r\n \nSome actions place a chest where you will put values.\n \nThey can be &anumbers&r, &6text&7, &7locations&r, or even &citems&r!"
        - "&6🪣 Variables&r\n \n&lA variable&r is a storage unit that holds a value.\n \nYou can set any value in it and later use that value in an action!"
        - "&6🪣 Variables&r\n \n&lA list&r can store multiple values.\n \nYou can sort, add new values, retrieve, or delete them."
        - "&6🪣 Variables&r\n \n&lDictionaries&r store values by &lkeys&r!\n \nEach key has a value. You can add keys with values or retrieve values by key. It's very convenient!"
    lines-controller:
      name: "&cBlock Mover &a[← Left-click] [Right-click →]"
