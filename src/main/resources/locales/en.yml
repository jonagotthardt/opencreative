#
# Translation can be changed in next updates,
# to remove this file and replace with new plugin's
# one, type command /oc resetlocale.
#

#
# Some messages support player's placeholders from PlaceholderAPI.
# Some messages aren't translated and can appear as `Not found message ...`
# Titles messages can contain only and only MiniMessage or Legacy format colors.
# Don't make messages same, it can cause problems while comparing items.
#

#
# If some messages is not found, you need to write in. For example:
#  Not found message lobby.title
#  Fill this message like here:
#   lobby:
#     title: "Text"
#

no-perms: "%prefix%&cInsufficient permissions!"
disabled: "&cThis feature is disabled :("
too-few-args: "&cNot enough arguments :("
cooldown: "%prefix%&cPlease wait %cooldown% seconds before using this command again."
maintenance: "%prefix%&cOops, it seems there's a maintenance break: this action is unavailable as maintenance is underway. Please wait until the maintenance is over!"
commands:
  give:
    help: "%prefix%To give an item to yourself or a player in your world, use:\n &6/give ID &7- Give an item to yourself\n &6/give Username ID &7- Give an item to a player\n &6/give Username ID Amount &7- Give an item with a specific amount to a player"
    wrong: "%prefix%&cThis item does not exist O_o"
    wrong-amount: "%prefix%&cYou specified the amount incorrectly, it should be a number, for example /give Steve apple 10"
  game-mode:
    wrong: "%prefix%&cYou specified an incorrect game mode. Allowed modes: creative, survival, adventure, spectator."
    help: "%prefix%In your world, you can switch the game mode for yourself or another player.\n &6/gamemode creative &7- Switch to creative mode\n &6/gamemode Username creative &7- Set a player to creative mode"
  teleport:
    help: "%prefix%You can teleport in your world to coordinates, or teleport players.\n &6/teleport X Y Z YAW PITCH &7- Teleport to coordinates\n &6/teleport Username &7- Teleport to a player\n &6/teleport FirstPlayer SecondPlayer &7- Teleport the first player to the second player"
    out-of-borders: "%prefix%&cCannot teleport beyond the world border."
  edit:
    help: "%prefix%Edit the name and description of the item in your hand.\n &6/edit name New Name &7- Rename the item\n &6/edit lore 1 Description Line &7- Edit a specific description line by its number \n &6/edit addlore Description Line &7- Add a new description line\n &6/edit clear &7- Clear the item's name and description"
    renamed: "%prefix%Item renamed: %name%"
    set-lore: "%prefix%Set line %number%: %lore%"
    cleared: "%prefix%Item's name and description cleared."
    item: "%prefix%&cHold the item in your main hand."
    lines-limit: "%prefix%&cDescription limit of %limit% lines reached."
    text-limit: "%prefix%&cCharacter limit of %limit% reached."
  play-sound:
    help: "%prefix%You can play a sound for yourself or a player.\n &6/playsound Sound Volume Speed &7- Play a sound for yourself\n &6/playsound Username Sound Volume Speed &7- Play a sound for a player"
    played: "%prefix%&fPlayed sound &6%sound% &fwith volume &6%volume%&f and speed &6%pitch%&f to player &6%player%"
  stop-sound:
    stopped-sound: "%prefix%&fStopped sound &6%sound%&f for player &6%player%&f."
    stopped-category: "%prefix%&fStopped sounds of category &6%category%&f for player &6%player%&f."
    stopped-all: "%prefix%&fStopped all sounds for player &6%player%&f."
locate:
  help: "%prefix%To find the world where a player is playing, type in the chat: &6/locate Username"
  found: "%prefix%&fPlayer &6%player%&f is currently playing in the world: \n&f %planetName%\n &f\n&a &a &n[Click to join]&f\n &f"
  offline: "%prefix%&cThe player is not currently playing in any worlds."
environment:
  help: "%prefix%Manage code, variables, and the world for developers.\n \n&6 /env variables clear &f- Clear variables\n&6 /env variables size &f- Number of variables\n&6 /env variables list &f- List of variables"
  variables:
    cleared: "%prefix%All variables have been successfully removed."
    size: "%prefix%There are currently &6%count% variables&f in the world.\n &fThis includes all list contents and keys with values from dictionaries."
    get:
      empty: "%prefix%&cThis variable does not exist :("
      message: "%prefix%Variable data &6%variable%&f:\n &fVariable type: %type%\n &fValue type: %valuetype%\n &fValue: &6%value%"
    list:
      empty: "%prefix%There are currently no variables set in the world."
      header: "\n%prefix%List of variables in the world (&6%current% &fout of &6%amount%&f total):"
      variable: "&f  &6 %name% &fType: &6%type%&f Value: &6%value%"
      next-page: "&a                   [Next →]"
      previous-page: "&c[← Back]"
      navigation: "\n&f Navigation: "
    set:
      help: "%prefix%To change variable value type in chat:\n &6/env var set [Variable Name] [global/saved] [text,number,item,location] (Value)\n&f Item, that will be used in setting item is from main hand."
      limit: "%prefix%&cReached limit of variables (%limit%)!"
      message: "%prefix%Assigned variable %variable%&f: &7%value%"
  debug:
    help: "%prefix%Debug mode sends event, action, and condition execution to the chat, along with their internal values.\n &6/env debug enable &f- Enable debug mode\n &6/env debug disable &f- Disable debug mode"
    enabled: "%prefix%&fWorld developer &6%player% &fenabled debug mode."
    disabled: "%prefix%&fWorld developer &6%player% &fdisabled debug mode."
  values:
    text: "&6Text"
    number: "&aNumber"
    event_value: "&6Event Value"
    variable: "&eVariable"
    location: "&fLocation"
    boolean: "&eBoolean"
    particle: "&dParticle"
    item: "&cItem"
    potion: "&bPotion"
    list: "&eList"
    vector: "&bVector"
    map: "&eMap"
  execute:
    help: "%prefix%Call executors by yourself, and they will execute code.\n &6/env execute function [Name] &f- Call Function.\n &6/env execute method [Name] &f- Call Method.\n &6/env execute player_join [Player] &f- Call Player Join event."
    offline: "%prefix%&cPlayer is not in world."
    function: "%prefix%Calling function &9%function%&f..."
    function-not-found: "%prefix%&cThis function doesn't exists O_o"
    method: "%prefix%Calling method &a%method%&f..."
    method-not-found: "%prefix%&cThis method doesn't exists O_o"
  platform:
    claimed: "%prefix%Created a &6new platform &ffor coding, now you can place coding blocks here too!"
    limit: "%prefix%&cYou reached a limit of %amount% platforms, you can't create new coding platforms anymore :("
help:
  placeholders: "%prefix%List of placeholders: &6%player% %player_uuid% %entity% %entity_uuid% %target% %target_uuid% %players_amount% %entities_amount% %online%"
creative:
  reloading: "%prefix%Reloading configuration and localization files, please wait..."
  reloaded: "%prefix%Plugin has been &6successfully&f reloaded!"
  resetting-locale: "%prefix%Loading default localization files, please wait..."
  reset-locale: "%prefix%Plugin has &6successfully&f reset the localization files to defaults!"
  loaded-worlds-list: "%prefix%List of loaded worlds, total %amount%: &6"
  deprecated-worlds:
    list: "%prefix%List of old worlds (total %amount%): "
    world: "&f ID: &6%id% &fOwner: &6%owner% &fCreated: &6%created% &fLast owner join: &6%seen%"
  corrupted-worlds:
    list: "%prefix%List of corrupted worlds (total %amount%): "
    world: "&f ID: &6%id% &3[Click to connect]"
    set-owner: "%prefix%Changed planet's owner to &6%player%&f, now it will be listed in worlds browser."
  creative-chat:
    cleared: "%prefix%The chat has been cleared by the server administration..."
    off: "%prefix%Creative chat is currently &6unavailable&f for communication, as it has been &6disabled&f by the server administration for all players. Please wait for the administration's decision..."
    disabled: "%prefix%A server admin &6%player%&f has &cdisabled&f creative chat..."
    enabled: "%prefix%A server admin &6%player%&f has &aenabled&f creative chat! Please follow the chat rules."
  maintenance:
    starting-notification: "%prefix%&cAttention!&f In &6%time% seconds, &fa maintenance break will begin, during which all worlds will be unloaded for technical work. \n \n&f If you are in a world, save your items and leave it by typing the command &6/spawn&f in the chat."
    starting-in: "%prefix%&fMaintenance break will start in &6%time% seconds&f."
    started: "\n%prefix%Maintenance break has &6begun&f, during which the server may be restarted.\n \n &fIt's time to take a break from the game, &6make yourself some tea&f and &6wait for the maintenance to end&f!"
    ended: "%prefix%Maintenance break has &aended&f, you can now play in your worlds. Enjoy the game!"
  debug:
    enabled: "%prefix%&fDebug mode is &6enabled&f, some experimental features will be able and console will get additional logs."
    disabled: "%prefix%&fDebug mode is &6disabled&f, goodbye experiments!"
  locale:
    changed: "%prefix%&fChanged language to &6English&f!"
    not-found: "%prefix%&cNot found localization file for this language O_o"
not-owner: "%prefix%&cYou are not the owner of this world."
not-developer: "%prefix%&cYou are not the developer of this world."
not-builder: "%prefix%&cYou are not the builder of this world."
only-in-world: "%prefix%&cThis can only be used in the world."
no-money: "%prefix%&cIt seems you don't have enough coins! You need at least %money% coins!"
no-planet-found: "%prefix%&cThis world does not exist."
private-planet: "%prefix%This world is currently &6private&f, only the owner can enter."
blacklisted-in-planet: "%prefix%You cannot visit this world because you are &6blacklisted&f in it."
no-player-found: "%prefix%&cThis player was not found."
same-player: "%prefix%&cYou cannot specify yourself."
same-world: "%prefix%&cYou are already playing in this world."
player-error: "&6 Worlds &8| &fA player error occurred. Please report this to the developer: &6%error%"
planet-error: "&6 Worlds &8| &fAn error occurred in the world: &6%error%"
planet-code-error:
  message: "\n &c &m                   &c ☹ ERROR &m                   \n&f\n &fOops, it seems there was a problem executing &f%event% &7-> &f%action% &7(%x%,%y%,%z%)\n \n&f Information: &6%error%\n \n &c &m                                                    \n&f"
  message-event-critical: "\n &4 &m          &4 ☠ CRITICAL ERROR &m          \n&f\n &cATTENTION! &fThe world has been put into build mode because a serious issue occurred during the execution of the code &f%event% &7(%x%,%y%,%z%)...\n \n&f Information: &6%error%\n \n &4 &m                                                    \n&f"
  message-event: "&6 Error &8| &fAn error occurred during the execution of the code &f%event% &7(%x%,%y%,%z%).\n &fError information: &6%error%"
  message-compile: "\n &c &m                   &c ☹ ERROR &m                   \n&f\n &fA problem occurred while saving the block &7(%x%,%y%,%z%)\n \n&f Information: &6%error%\n \n &c &m                                                    \n&f"
  numberformatexception: "A number was expected, but the item did not contain one. Check the items in the chest for this action."
  illegalargumentexception: "An incorrect value was found in the chest. You might have specified a negative number, or a variable returned an incorrect value, or something couldn't be retrieved from the value. Check the chest's contents!"
  nullpointerexception: "Some value is null, such as a variable or event value. Perhaps you didn't set a variable, or the event value is not supported by this event."
  bad-piston: "An extra piston was detected, which needs to be removed. If it’s not extra, select the condition type."
  indexoutofboundsexception: "Values were expected in the chest, but they are either missing or insufficient. Check the items in the chest for this action!"
  operations-limit: "The code line was called multiple times in a row and reached the limit of %limit% calls. It seems there's a line that calls itself repeatedly. Find it and fix it. This line's execution has been stopped."
  unknown: "Oops... It seems this is an unknown error, details: "
  unknown-block-detected: "&f\n&6 Error &8| &fWhile saving coding blocks, some were found that were removed in updates. Click their sign and remove unnecessary chest contents (SHIFT+Right-click)."
  unknown-block-coords: " Block %category% &8-&7 %type%: &7(%x%, %y%, %z%)"
  unknown-layout: "&cThis block opened a menu without hints, as there is a problem loading them..."
  hover-message: "&fClick to teleport to the block."
  temp-var-not-exists: "The temporary value %variable% for this event was not found because the event is not compatible with this value. Replace the event with a more suitable one."
planet-code-debug:
  condition:
    returned-true: "&fCondition %type%&f executed, &aTrue&f."
    returned-false: "&fCondition %type%&f did not execute, &cFalse&f."
    opposed:
      true: "&aYes"
      false: "&cNo"
  hover:
    argument: "&7%name%: %type%&7 = &6%value%"
    executor: "&7Category: %category%\n&7Executor: %type%\n \n&7Actions to execute: &e%actions%"
    action: "&7Category: %category%\n&7Action: %type%\n \n&7Arguments:\n%arguments%"
    condition: "&7Category: %category%\n&7Condition: %type%\n&7Opposed: %opposed%\n \n&7Arguments:\n%arguments%"
  variable:
    set: "&6 Debug &8| &fNew value for %variable%&f: &7%value%"
    created: "&6 Debug &8| &fVariable %variable%&f created: &7%value%"
  log: "&6 Debug &8| &f%log%"
  event-message: "&7 Event Call &8| &7Event %type%&f occurred, finding the trigger..."
  variable-found: "&7           %name% &a=&7 %value%"
  variable-not-found: "&7           %name% &cdefault&7: %value%"
  executor-message: "&7 &7%type%&7 &8(%x% %y% %z%)"
  action-message: "&7 | %type%&7 &8(%x% %y% %z%)"
  action-hover: "&7Type %type% &7Argument &6%name%&7 Value: &6%value%"
  condition-message-true: "&7 Condition &8| &7%type%&7 (%x% %y% %z%) returned &aYES&7: Executing actions..."
  condition-message-false: "&7 Condition &8| &7%type%&7 (%x% %y% %z%) returned &cNO&7: Executing otherwise..."
lobby:
  title: "%branding%"
  subtitle: "&fLet's &acreate&f in your worlds!"
  message: "\n <white>\n<white>\n <white>\n <white>%branding% <dark_gray>5.3\n<green> Well, it's possible!\n <white>\n<gold> ⭐ <white>Explore all <gold>worlds<white> using the compass!\n<light_purple> ❤ <white>Create your own world and <light_purple>invite <white>your friends!\n <yellow>⌚<white> Have fun and <yellow>create <white>whatever you want!\n \n<white>\n <white>"
creating-world:
  not-enough-played: "%prefix%&fYou need to play &6%time%&f in other worlds before creating a new world."
  title: "&eCreating World ◌"
  subtitle: "&fPlease wait a few seconds..."
  default-world-name: "&7Player %player%'s World"
  default-world-description: "&7My beautiful world!"
  welcome-title: "&a☺ Hello!"
  welcome-subtitle: "&fWelcome to your world"
  welcome: "\n &f\n&a ☻ Welcome to your world!\n&f This is your &a&nprivate space&f, where you will &a&ncreate&f.\n &fYour goal is to &ecreate an interesting world for everyone&f.\n \n&f Check out the &duseful&f commands:\n &6/world &7- &fCustomize your world and player permissions.\n &6    /ad &7- &fInvite players to your world.\n &6 /build &7- &fSwitch to build mode &7(all are immortal)&f.\n &6  /dev &7- &fWorld developer mode.\n &6  /play &7- &fSwitch to play mode &7(players can fight)&f.\n &f"
