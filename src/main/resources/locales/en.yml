    error: "%prefix%The world description does not meet one of the requirements:\n&f- The description must be at least 5 characters long and no more than 30."
    changed: "%prefix%You have set a new &6description&f for the world: %description%"
  world-spawn:
    title: "&bSpawn point"
    subtitle: "&fsuccessfully &6changed&f."
  world-icon:
    changed: "%prefix%Icon changed."
    error: "%prefix%&cNot an item."
  world-sharing:
    enabled: "%prefix%Players &6can&f now visit your world."
    disabled: "%prefix%You have &6disabled&f players from visiting your world."
  world-category:
    changed: "%prefix%You have set the world category to &6%category%&f."
  autosave:
    enabled: "%prefix%Auto-saving is &6enabled&f, now you can build safely and your buildings will be saved."
    disabled: "%prefix%&cAuto-saving is disabled by world owner, &nnew buildings will be not saved&c!"
    warning: "%prefix%&cNew buildings will be not saved in world, because auto-saving is disabled by world owner."
