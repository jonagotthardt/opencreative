    given-player: "%prefix%Ви видали предмет &6%material%&f x%amount% гравцеві &6%player%&f."
    wrong: "%prefix%&cТакого предмета не існує О_о"
    wrong-amount: "%prefix%&cВи неправильно вказали кількість, це має бути числом, наприклад /give Steve apple 10"
  game-mode:
