    help: "%prefix%Щоб у своєму світі видати предмет собі чи гравцю використовуйте:\n &6/give ID &7- Видати собі предмет\n &6/give Нікнейм ID &7- Видати гравцю предмет\n &6/give Нікнейм ID Кількість &7- Видати гравцю предмет із кількістю"
