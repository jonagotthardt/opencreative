    offline: "%prefix%&cГравець зараз не грає у світах."
modules:
  help: "%prefix%Модулі це готові рядки блоків кодингу від гравців, які додають різні функції у світ. Їх встановлюють у світі для розробників. Для перегляду використовуйте &6/module&f.\n&6 /module load ID &f- Завантажити модуль за ID"
  not-found: "%prefix%&cМодуль з ID %id% не знайдено.. O_o"
