  welcome-subtitle: "&fЛаскаво просимо у твій світ"
  welcome: "\n &f\n&a ☻ Вітаємо у своєму світі!\n&f Це твоє &a&nособисте місце&f, де ти будеш &a&nтворити&f.\n &fТвоя мета - &eстворити цікавий світ для всіх&f.\n \n&f Ознайомся з &dкорисними&f командами:\n &6/world &7- &fНалаштуй свій світ та права гравців.\n &6    /ad &7- &fЗапросіть гравців у свій світ.\n &6 /build &7- &fПерейти в режим будівництва &7(усі безсмертні)&f.\n &6  /dev &7- &fРежим розробника світу.\n &6  /play &7- &fПерейти в режим гри &7(гравці зможуть битися)&f.\n &f"
