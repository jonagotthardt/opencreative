  subtitle: "&fДавайте &aтворити&f у своїх світах!"
  message: "\n <white>\n<white>\n <white>\n <white>%branding% <dark_gray>6.0\n<green> Що ж, це можливо!\n <white>\n<gold> ⭐ <white>Оглянь всі <gold>світи<white> за допомогою компаса!\n<light_purple> ❤ <white>Створи свій світ і <light_purple>запроси <white>друзів!\n <yellow>⌚<white> Веселися і <yellow>твори <white>що завгодно!\n \n<white>\n <white>"
