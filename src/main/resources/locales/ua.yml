    removed-lore: "%prefix%Прибрано %number% рядок з опису предмета."
    cleared: "%prefix%Прибрано назву та опис предмета."
    item: "%prefix%&cТримайте предмет в основній руці."
    lines-limit: "%prefix%&cДосягнуто ліміт опису в %limit% рядків"
    text-limit: "%prefix%&cДосягнуто ліміт в %limit% символів."
    not-number: "%prefix%&cНе є числом: %argument%"
  time:
    help: "%prefix%Змінюйте час доби у вашому світі, це змінить небо, яскравість блоків та поведінку світу.\n &6/time set 0 &7- Встановить день\n &6/time set 12500 &7- Встановить вечір \n &6/time set 15000 &7- Встановить ніч\n &6/time add 1000 &7- Пропустити 1000 тіків"
