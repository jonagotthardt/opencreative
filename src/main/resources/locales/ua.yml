  weather:
    help: "%prefix%Змінюйте погоду у вашому світі на сонячну, дощову чи навіть грізну!\n &6/weather sun &7- Сонячна погода\n &6/weather rain &7- Дощова погода \n &6/weather thunder &7- Дощ із громом та блискавками"
    changed:
      sun: "%prefix%Тепер у світі &6сонячно&f і без опадів."
      rain: "%prefix%Тепер у світі йде &6дощ&f, і монстри не згорають."
      thunder: "%prefix%Тепер у світі &6гроза&f — бережіться блискавок!"
  play-sound:
    help: "%prefix%Ви можете відтворювати звук собі чи гравцю.\n &6/playsound Звук Гучність Швидкість Сид &7- Прослухати звук самому\n &6/playsound Нікнейм Звук Гучність Швидкість Сид &7- Відтворити звук гравцю"
    played: "%prefix%&fВідтворено звук &6%sound% &fіз гучністю &6%volume%&f та швидкістю &6%pitch%&f гравцю &6%player%"
