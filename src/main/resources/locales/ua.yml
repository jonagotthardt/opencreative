      creative: "%prefix%Тепер у вас &6творчий&f режим, у якому ви можете отримувати будь-які предмети, літати над світом, будувати та не отримувати шкоду."
      survival: "%prefix%Ви перейшли у &6режим виживання&f, у якому можете змінювати світ і отримувати шкоду."
      spectator: "%prefix%Тепер ви &6спостерігаєте&f за світом! Вселяйтесь у моба або гравця натисканням лівої кнопки миші."
      adventure: "%prefix%Тепер ви у &6режимі пригод&f, у якому не можете ставити або ламати блоки. Досліджуйте світ!"
    changed-player:
      creative: "%prefix%Ви встановили &6творчий&f режим гравцеві &6%player%&f. Тепер він може літати, отримувати будь-які предмети та будувати.\n &cОднак гравець усе ще може ламати блоки у вашому світі. Якщо ви йому не довіряєте — встановіть йому режим пригод: /gamemode adventure %player%"
      survival: "%prefix%Ви встановили &6режим виживання&f гравцеві &6%player%&f. Тепер він може будувати, ламати блоки та отримувати шкоду."
      spectator: "%prefix%Ви встановили &6режим спостерігача&f гравцеві &6%player%, тепер він може лише спостерігати за світом."
      adventure: "%prefix%Ви встановили &6режим пригод&f гравцеві &6%player%, тепер він може досліджувати світ і отримувати шкоду, але не може ставити чи ламати блоки."
    help: "%prefix%У своєму світі ви можете переключити режим гри у себе чи в когось із гравців.\n &6/gamemode creative &7- Переключитися на творчий режим\n &6/gamemode Нікнейм creative &7- Видати гравцю творчий режим"
  teleport:
    help: "%prefix%Ви можете переміщатися у своєму світі на координати, або ж переміщати гравців.\n &6/teleport X Y Z YAW PITCH &7- Телепорт на координати\n &6/teleport Нікнейм &7- Телепорт до гравця\n &6/teleport ПершийГравець ДругийГравець &7- Телепорт першого гравця до другого"
    teleported: "%prefix%Ви телепортувалися до гравця &6%player%&f."
    teleported-player: "%prefix%Ви телепортували гравця &6%first%&f до &6%second%&f."
    teleported-coords: "%prefix%Ви телепортувалися на координати: &6%x% %y% %z% %yaw% %pitch%"
    out-of-borders: "%prefix%&cНеможливо телепортуватися за межу світу."
  edit:
    help: "%prefix%Редагуйте назву та опис предмета у вашій руці.\n &6/edit name Нова назва &7- Перейменує предмет\n &6/edit lore 1 Рядок опису &7- Змінить рядок опису за номером \n &6/edit addlore Рядок опису &7- Додасть новий рядок опису\n &6/edit clear &7- Очистить назву та опис предмета"
