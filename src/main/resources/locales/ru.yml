      pages:
        - "&9☻ Ты в мире кодинга!&r\n \nЗдесь ты создашь код для своего мира с помощью &3б&7л&6о&9к&cо&0в в инвентаре.\n \nЭта книжка поможет освоить основные понятия в кодинге, &cперелистывай далее..."
        - "&3⚂ Познакомься с блоками!&r\n \nБлоки &3события&0 ставят на &9синее стекло&0 и они запускают работу блоков &7действий&0 и &6условий&0, которые ставят на &8серое&0 стекло."
        - "&3⚂ Познакомься с блоками!&r\n \n&lЧто за события?!\n \n&3Событие игрока&r - это когда игрок что-то делает в мире, и в коде после этого мы выполняем действия и условия над самим игроком."
        - "&3⚂ Познакомься с блоками!&r\n \n&lА действия это?\n \n&7Действие над игроком&r позволит тебе управлять игроком: выдать предмет, телепорт или кикнуть из мира. И это не всё!"
        - "&3⚂ Познакомься с блоками!&r\n \n&lРабота условий?\n \n&rЕсли &6условие&r выполнится, то код внутри поршней тоже! Проверь у игрока никнейм, предмет, блок или его состояние."
        - "&2✉ Значения для действий!&r\n \nНекоторые действия ставят сундук, в который вы положите значения.\n \nОни могут быть &aчислом&r, &6текстом&7, &7местоположением&r и даже &cпредметом&r!"
        - "&6🪣 Переменные&r\n \n&lПеременная&r - это хранилище, которое хранит значение. \n \nВы можете установить любое значение в неё и потом применить это значение в действии!"
        - "&6🪣 Переменные&r\n \n&lСписок&r может хранить много значений в себе. \n \nВы можете его сортировать, добавлять новые значения, получать или удалять их."
        - "&6🪣 Переменные&r\n \n&lСловари&r хранят значения по &lключам&r!\n \nУ каждого ключа есть значение, вы можете добавлять ключи со значениями или даже получать значение по ключу. Это удобно!"
