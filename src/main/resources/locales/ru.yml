  teleport:
    help: "%prefix%Вы можете перемещаться в своём мире на координаты, или же перемещать игроков.\n &6/teleport X Y Z YAW PITCH &7- Телепорт на координаты\n &6/teleport Никнейм &7- Телепорт к игроку\n &6/teleport ПервыйИгрок ВторойИгрок &7- Телепорт первого игрока к второму"
