  message: "\n &c &m                   &c ☹ ОШИБКА &m                   \n&f\n &fОй, кажется возникла проблема при исполнении &f%event% &7-> &f%action% &7(%x%,%y%,%z%)\n \n&f Информация: &6%error%\n \n &c &m                                                    \n&f"
  message-event-critical: "\n &4 &m          &4 ☠ КРИТИЧЕСКАЯ ОШИБКА &m          \n&f\n &cВНИМАНИЕ! &fМир переведён в режим строительства, поскольку во время исполнения кода &f%event% &7(%x%,%y%,%z%) &fпроизошла серьёзная проблема...\n \n&f Информация: &6%error%\n \n &4 &m                                                    \n&f"
  message-event: "&6 Ошибка &8| &fВо время исполнения кода &f%event% &7(%x%,%y%,%z%) &fпроизошла ошибка.\n &fИнформация о ней: &6%error%"
  message-compile: "\n &c &m                   &c ☹ ОШИБКА &m                   \n&f\n &fВозникла проблема при сохранении блока &7(%x%,%y%,%z%)\n \n&f Информация: &6%error%\n \n &c &m                                                    \n&f"
  numberformatexception: "Ожидалось число, однако предмет его не содержал. Проверьте предметы в сундуке этого действия. "
  illegalargumentexception: "В сундуке неправильное значение. Возможно вы указали негативное число, или переменная выдала неверное значение, или не удалось что-то получить из значения. Проверьте содержимое сундука! "
  nullpointerexception: "Какое-то значение является пустым, например переменная или же значение события. Возможно вы не установили переменную или же значение события не поддерживает это событие.\n \n "
  bad-piston: "Замечен лишний поршень, который нужно убрать. Если он точно не лишний, то выберите тип условия. "
  indexoutofboundsexception: "Ожидались значения в сундуке, однако их либо нет либо их мало. Проверьте предметы в сундуке этого действия! "
