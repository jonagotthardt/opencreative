  unknown-block-coords: " Блок %category% &8-&7 %type%: &7(%x%, %y%, %z%)"
  unknown-layout: "&cЭтот блок открыл меню без подсказок, поскольку есть проблема при их загрузке..."
  hover-message: "&fНажми, чтобы телепортироваться к блоку."
