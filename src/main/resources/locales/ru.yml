  edit:
    help: "%prefix%Редактируйте название и описание предмета в вашей руке.\n &6/edit name Новое имя &7- Переименует предмет\n &6/edit lore 1 Строка описания &7- Изменит строку описания по номеру \n &6/edit addlore Строка описания &7- Добавит новую строку описания\n &6/edit clear &7- Очистит название и описание предмета"
    renamed: "%prefix%Предмет переименован: %name%"
    set-lore: "%prefix%Установлена %number% строка: %lore%"
    removed-lore: "%prefix%Убрана %number% строка с описания предмета."
    cleared: "%prefix%Убрано название и описание предмета."
    item: "%prefix%&cДержите предмет в основной руке."
    lines-limit: "%prefix%&cДостигнут лимит описания в %limit% строк"
    text-limit: "%prefix%&cДостигнут лимит в %limit% символов."
  time:
    help: "%prefix%Изменяйте время суток в вашем мире, это изменит небо, яркость блоков и поведение мира.\n &6/time set 0 &7- Установит день\n &6/time set 12500 &7- Установит вечер \n &6/time set 15000 &7- Установит ночь\n &6/time add 1000 &7- Пропустить 1000 тиков"
  weather:
    help: "%prefix%Меняйте погоду в вашем мире на солнечную, дождевую или даже громовую!\n &6/weather sun &7- Солнечная погода\n &6/weather rain &7- Дождевая погода \n &6/weather thunder &7- Дождь с громом и молниями"
  play-sound:
    help: "%prefix%Вы можете проигрывать звук себе или игроку.\n &6/playsound Звук Громкость Скорость &7- Прослушать звук самому\n &6/playsound Никнейм Звук Громкость Скорость &7- Проиграть звук игроку"
    played: "%prefix%&fПроигран звук &6%sound% &fс громкостью &6%volume%&f и скоростью &6%pitch%&f игроку &6%player%"
