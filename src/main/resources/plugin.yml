name: 'OpenCreative'
main: ua.mcchickenstudio.opencreative.OpenCreative
api-version: 1.21

version: '5.5.0'
description: 'Let players create the worlds'
build: ${maven.build.timestamp}

authors: [McChicken Studio]
contributors: [McChicken Team, onn512, pawsashatoy]
prefix: "OC+"

load: POSTWORLD
database: false
website: https://gitlab.com/eagles-creative/opencreative

softdepend: [PlaceholderAPI, ProtocolLib, Vault, LibsDisguises]

